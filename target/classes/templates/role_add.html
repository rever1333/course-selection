<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Add Role</title>
    <th:block th:replace="common_resources::common_css"></th:block>
    <th:block th:replace="common_resources::common_js"></th:block>
</head>

<body class="hold-transition skin-purple sidebar-mini">

<header th:replace="~{common_header::header}"></header>
<aside th:replace="~{common_aside::aside}"></aside>

    <div class="wrapper">
        <div class="content-wrapper">

            <!-- 内容头部 -->
            <section class="content-header">
                <h1>
                    Role Management
                    <small>Add Role</small>
                </h1>
                <ol class="breadcrumb">
                    <li><a th:href="@{/index}"><i class="fa fa-dashboard"></i> Home</a></li>
                    <li><a th:href="@{/role/all}">Role Management</a></li>
                    <li class="active">Add Role</li>
                </ol>
            </section>
            <!-- 内容头部 /-->

            <!-- 正文区域 -->
            <section class="content">
                <form th:action="@{/role/add}" method="post">
<!--                    <div class="tab-pane" id="tab-common">-->
                        <div class="row data-type">
                            <div class="panel panel-heading">Role Information</div>
                            <div class="col-md-2 title">Role Name</div>
                            <div class="col-md-4 data">
                                <input type="text" class="form-control" placeholder="用户名称" name="roleName" value="">
                            </div>

                            <div class="col-md-2 title">Role Description</div>
                            <div class="col-md-4 data">
                                <input type="text" class="form-control" placeholder="Role Description" name="roleDesc" value="">
                            </div>

                            <div class="col-md-2 title"></div>
                            <div class="col-md-10 data text-center">
                                <button type="submit" class="btn bg-maroon">Save</button>
                                <button type="button" class="btn bg-default" onclick="history.back(-1);">Back</button>
                            </div>

                        </div>
<!--                    </div>-->
                </form>
                
            </section>
            <!-- 正文区域 /-->
        </div>
    </div>

<footer th:replace="~{common_footer::footer}"></footer>

</body>

</html>
